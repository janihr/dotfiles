theme = "onedark"

[editor]
line-number = "relative"
bufferline = "multiple"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.whitespace.render]
space = "none"
tab = "none"
nbsp = "all"
nnbsp = "all"
newline = "all"

[editor.file-picker]
hidden = false
git-global = false

[keys.normal.space]
"q" = ":buffer-close"
"." = "file_picker_in_current_buffer_directory"

